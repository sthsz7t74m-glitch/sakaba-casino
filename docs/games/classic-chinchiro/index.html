<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#45d6bd"><title>ちんちろ｜宴会ゲームBOX</title><style>
*{box-sizing:border-box}body{margin:0;background:#fff7df;color:#26304a;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP","Yu Gothic",sans-serif;font-weight:800}.app{width:min(620px,100%);min-height:100vh;margin:auto;padding:12px 14px 30px}.head{display:grid;grid-template-columns:48px 1fr 48px;align-items:center;background:#fff;border:2px solid #26304a18;border-radius:22px;padding:8px;box-shadow:0 7px 0 #26304a10;text-align:center}.head button{width:42px;height:42px;border:0;border-radius:50%;background:#ff6d79;color:#fff;font-size:31px;font-weight:1000}.head p,.head h1{margin:0}.head p{font-size:10px;letter-spacing:.14em;color:#7769c9}.head h1{font-size:25px}.icon{font-size:30px}.rules{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}.rules span{background:#fff;border:2px solid #26304a18;border-radius:14px;padding:10px 4px;text-align:center;font-size:12px;box-shadow:0 4px 0 #26304a12}.table{background:linear-gradient(145deg,#45d6bd,#72e3ce);border:3px solid #26304a;border-radius:28px;padding:14px;box-shadow:0 9px 0 #26304a22}.top{display:flex;justify-content:space-between;align-items:center;color:#193d45}.top label{display:flex;gap:7px;align-items:center;background:#fff9;border-radius:999px;padding:7px 10px;font-size:13px}.top input{width:22px;height:22px;accent-color:#ff6d79}.dice{min-height:210px;display:flex;justify-content:center;align-items:center;gap:9px}.die{display:grid;place-items:center;width:88px;height:88px;background:#fff;border-radius:20px;color:#fff;font-size:99px;line-height:1;filter:drop-shadow(0 8px 0 #244d5360)}.die.gold{color:#ffd42a;filter:drop-shadow(0 8px 0 #a86d0060)}.die.roll{animation:shake .12s infinite alternate}@keyframes shake{to{transform:translateY(-7px) rotate(8deg)}}.result{text-align:center;min-height:48px;padding:9px;border-radius:15px;background:#fff;color:#59617d;font-size:23px;font-weight:1000;box-shadow:0 5px 0 #319f91}.result.win{color:#d57900;background:#fff0a8}.result.lose{color:#dd4058;background:#ffe1e7}.note{text-align:center;color:#20585a;font-size:12px}.rollbtn{width:100%;margin-top:18px;padding:16px;border:0;border-radius:18px;background:#ff6d79;color:#fff;font-size:18px;font-weight:1000;box-shadow:0 6px 0 #c83750}.rollbtn:active{transform:translateY(3px);box-shadow:0 3px 0 #c83750}.rollbtn:disabled{opacity:.7}@media(max-width:380px){.die{width:76px;height:76px;font-size:86px}.dice{min-height:185px}}
</style></head><body><main class="app"><header class="head"><button onclick="location.href='../../'" aria-label="ゲーム一覧へ戻る">‹</button><div><p>CLASSIC CHINCHIRO</p><h1>ちんちろ</h1></div><span class="icon">⚂</span></header><section class="rules"><span>ピンゾロ 5倍</span><span>ゾロ目 3倍</span><span>シゴロ 2倍</span><span>ヒフミ 2倍払い</span></section><section class="table"><div class="top"><span id="round">勝負 1</span><label>裏目モード <input id="reverse" type="checkbox"></label></div><div class="dice" id="dice"></div><div class="result" id="result">サイコロを振って勝負！</div><p class="note">同じ目が2個なら残り1個が「○の目」。ゴールドダイスは1/36です。</p></section><button class="rollbtn" id="roll">サイコロを振る</button></main><script>
const glyph=['⚀','⚁','⚂','⚃','⚄','⚅'],diceEl=document.getElementById('dice'),resultEl=document.getElementById('result'),rollBtn=document.getElementById('roll'),roundEl=document.getElementById('round');let dice=[1,2,3],round=0;
function draw(rolling=false,gold=false){diceEl.innerHTML=dice.map(v=>`<span class="die${rolling?' roll':''}${gold?' gold':''}">${glyph[v-1]}</span>`).join('')}
function judge(raw,reverse){const v=reverse?raw.map(n=>7-n):raw.slice(),s=v.slice().sort((a,b)=>a-b);if(s[0]===s[2])return{label:s[0]===1?'ピンゾロ':s[0]+'のゾロ目',tone:'win'};if(s.join('')==='456')return{label:'シゴロ',tone:'win'};if(s.join('')==='123')return{label:'ヒフミ',tone:'lose'};for(let n=1;n<=6;n++)if(v.filter(x=>x===n).length===2){const p=v.find(x=>x!==n)??n;return{label:p+'の目',tone:p>=4?'win':p<=2?'lose':'draw'}}return{label:'目なし',tone:'draw'}}
rollBtn.onclick=()=>{rollBtn.disabled=true;rollBtn.textContent='勝負中…';resultEl.textContent='';draw(true,false);setTimeout(()=>{const gold=Math.floor(Math.random()*36)===0;dice=gold?[6,6,6]:[1,2,3].map(()=>Math.floor(Math.random()*6)+1);const r=judge(dice,document.getElementById('reverse').checked);round++;roundEl.textContent='勝負 '+(round+1);resultEl.textContent=(document.getElementById('reverse').checked?'裏目 → ':'')+r.label;resultEl.className='result '+r.tone;draw(false,gold);rollBtn.disabled=false;rollBtn.textContent='サイコロを振る'},650)};draw();
</script></body></html>
